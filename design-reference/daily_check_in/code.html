<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Daily Check-in - Arohi</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "phase-menstrual": "#E63970",
                        "surface-container": "#ffe8ee",
                        "on-primary": "#ffffff",
                        "background": "#fff8f8",
                        "error": "#ba1a1a",
                        "surface-container-high": "#fbe2e8",
                        "surface": "#fff8f8",
                        "phase-ovulatory-accent": "#FFD54F",
                        "inverse-primary": "#ffb1c5",
                        "primary-fixed-dim": "#ffb1c5",
                        "secondary-container": "#f3d9e1",
                        "on-surface-variant": "#574146",
                        "on-surface": "#25181c",
                        "surface-container-low": "#fff0f3",
                        "surface-bright": "#fff8f8",
                        "tertiary-fixed": "#ffd9df",
                        "on-tertiary": "#ffffff",
                        "on-secondary-container": "#715d64",
                        "surface-container-highest": "#f5dce3",
                        "surface-variant": "#f5dce3",
                        "phase-ovulatory-main": "#FF4081",
                        "secondary-fixed-dim": "#d9c0c8",
                        "primary-fixed": "#ffd9e1",
                        "error-container": "#ffdad6",
                        "primary": "#ac2a5d",
                        "phase-luteal": "#CE93D8",
                        "on-secondary-fixed-variant": "#544248",
                        "outline-variant": "#ddbfc5",
                        "phase-follicular": "#FF8FB1",
                        "on-tertiary-fixed": "#3f0018",
                        "on-error-container": "#93000a",
                        "surface-blush": "#FFF5F8",
                        "secondary-fixed": "#f6dce4",
                        "on-tertiary-container": "#6f002f",
                        "outline": "#8a7176",
                        "tertiary": "#b90c55",
                        "text-muted": "#8A767C",
                        "on-primary-fixed": "#3f001b",
                        "inverse-on-surface": "#ffecf0",
                        "on-primary-fixed-variant": "#8c0a46",
                        "tertiary-container": "#ff6c95",
                        "secondary": "#6d5960",
                        "surface-tint": "#ac2a5d",
                        "on-secondary-fixed": "#26171d",
                        "on-background": "#25181c",
                        "on-tertiary-fixed-variant": "#8f003f",
                        "on-secondary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-container": "#6e0035",
                        "inverse-surface": "#3b2c31",
                        "on-error": "#ffffff",
                        "tertiary-fixed-dim": "#ffb1c2",
                        "primary-container": "#ff6b9d",
                        "surface-dim": "#ecd4da"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-padding": "20px",
                        "touch-target-min": "48px",
                        "stack-gap": "16px",
                        "section-margin": "32px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "label-caps": ["Nunito Sans"],
                        "headline-lg-mobile": ["Nunito Sans"],
                        "headline-lg": ["Nunito Sans"],
                        "display-lg": ["Nunito Sans"],
                        "body-sm": ["Nunito Sans"],
                        "title-md": ["Nunito Sans"],
                        "button-text": ["Nunito Sans"],
                        "body-lg": ["Nunito Sans"]
                    },
                    "fontSize": {
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "headline-lg-mobile": ["22px", { "lineHeight": "28px", "fontWeight": "700" }],
                        "headline-lg": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "display-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "title-md": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "button-text": ["16px", { "lineHeight": "20px", "fontWeight": "700" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-lg min-h-screen pb-[100px]">
<!-- Top App Bar (Transactional, no Bottom Nav) -->
<header class="bg-background flex justify-between items-center px-container-padding py-4 w-full sticky top-0 z-50 bg-transparent flat no shadows">
<button class="w-12 h-12 flex items-center justify-center text-primary hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="text-text-muted font-label-caps text-label-caps">Step 1 of 3</div>
</header>
<main class="px-container-padding max-w-md mx-auto">
<!-- Header Section with Sakhi Mascot placeholder -->
<div class="mt-4 mb-section-margin flex flex-col items-center text-center">
<div class="w-24 h-24 mb-4 rounded-full bg-surface-container flex items-center justify-center overflow-hidden shadow-[0_-4px_20px_rgba(255,107,157,0.08)]">
<img class="w-full h-full object-cover" data-alt="A soft, cute, minimalist lotus flower mascot named Sakhi. Friendly expression, rounded organic petals, warm pink and blush colors. Modern vector style, simple and welcoming. High-key soft white lighting, light-mode aesthetic, serene mood." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAq9nhlw9WInmb-JCUgv2ock1KTEtaBKbnNLZW97pLr4T2tMNoTJZvXQnxHYTa0VpA1ZMjuvdRLoPEaTvOTQx_v0N0q-1Trs60RVeUFtbTSn2BEGEw9O_ZZyVv9b4gKny1ozF5lREjw5SNAZb4QP-ncbZGaSFxVC00EHi1zyuQ51bwXWmnCzW5QNcRxUJnW5RO0bhhJv1sq1TY03DdOmuIF1Guwsq4WHaLmHRhrleyHPLTnczCYkmTEeHi_CGucNqlnZwfLmGk83tI"/>
</div>
<h1 class="font-display-lg text-display-lg text-primary">How are you today?</h1>
<p class="font-body-lg text-body-lg text-text-muted mt-2">Let's log your daily check-in.</p>
</div>
<!-- Mood Section -->
<section class="mb-section-margin bg-surface rounded-[20px] p-4 shadow-[0_-4px_20px_rgba(255,107,157,0.08)]">
<h2 class="font-title-md text-title-md text-on-surface mb-4">Mood</h2>
<div class="flex justify-between items-center">
<button class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center hover:bg-surface-container-highest transition-colors active:scale-95 text-2xl" onclick="selectMood(this)">😢</button>
<button class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center hover:bg-surface-container-highest transition-colors active:scale-95 text-2xl" onclick="selectMood(this)">😕</button>
<button class="w-12 h-12 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center shadow-md active:scale-95 text-2xl transform scale-110 ring-2 ring-primary-container ring-offset-2 ring-offset-surface" onclick="selectMood(this)">😐</button>
<button class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center hover:bg-surface-container-highest transition-colors active:scale-95 text-2xl" onclick="selectMood(this)">🙂</button>
<button class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center hover:bg-surface-container-highest transition-colors active:scale-95 text-2xl" onclick="selectMood(this)">😄</button>
</div>
</section>
<!-- Energy Section -->
<section class="mb-section-margin bg-surface rounded-[20px] p-4 shadow-[0_-4px_20px_rgba(255,107,157,0.08)]">
<h2 class="font-title-md text-title-md text-on-surface mb-4">Energy Level</h2>
<div class="flex justify-between items-center">
<button class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center hover:bg-surface-container-highest transition-colors active:scale-95" onclick="selectEnergy(this)"><span class="material-symbols-outlined text-on-surface-variant">battery_0_bar</span></button>
<button class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center hover:bg-surface-container-highest transition-colors active:scale-95" onclick="selectEnergy(this)"><span class="material-symbols-outlined text-on-surface-variant">battery_2_bar</span></button>
<button class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center hover:bg-surface-container-highest transition-colors active:scale-95" onclick="selectEnergy(this)"><span class="material-symbols-outlined text-on-surface-variant">battery_4_bar</span></button>
<button class="w-12 h-12 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center shadow-md active:scale-95 transform scale-110 ring-2 ring-primary-container ring-offset-2 ring-offset-surface" onclick="selectEnergy(this)"><span class="material-symbols-outlined">battery_5_bar</span></button>
<button class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center hover:bg-surface-container-highest transition-colors active:scale-95" onclick="selectEnergy(this)"><span class="material-symbols-outlined text-on-surface-variant">battery_full</span></button>
</div>
</section>
<!-- Symptoms Section -->
<section class="mb-section-margin">
<h2 class="font-title-md text-title-md text-on-surface mb-4 px-2">Symptoms</h2>
<div class="flex overflow-x-auto no-scrollbar gap-2 pb-4 px-2 -mx-2">
<button class="min-h-[48px] px-6 py-2 rounded-full bg-surface-container-high text-on-surface-variant font-button-text text-button-text whitespace-nowrap hover:bg-surface-container-highest transition-colors flex-shrink-0" onclick="togglePill(this)">Cramps</button>
<button class="min-h-[48px] px-6 py-2 rounded-full bg-primary-container text-on-primary-container font-button-text text-button-text whitespace-nowrap shadow-md flex-shrink-0 ring-1 ring-primary-container" onclick="togglePill(this)">Bloating</button>
<button class="min-h-[48px] px-6 py-2 rounded-full bg-surface-container-high text-on-surface-variant font-button-text text-button-text whitespace-nowrap hover:bg-surface-container-highest transition-colors flex-shrink-0" onclick="togglePill(this)">Acne</button>
<button class="min-h-[48px] px-6 py-2 rounded-full bg-surface-container-high text-on-surface-variant font-button-text text-button-text whitespace-nowrap hover:bg-surface-container-highest transition-colors flex-shrink-0" onclick="togglePill(this)">Fatigue</button>
<button class="min-h-[48px] px-6 py-2 rounded-full bg-surface-container-high text-on-surface-variant font-button-text text-button-text whitespace-nowrap hover:bg-surface-container-highest transition-colors flex-shrink-0" onclick="togglePill(this)">Headache</button>
<button class="min-h-[48px] px-6 py-2 rounded-full bg-primary-container text-on-primary-container font-button-text text-button-text whitespace-nowrap shadow-md flex-shrink-0 ring-1 ring-primary-container" onclick="togglePill(this)">Cravings</button>
</div>
</section>
<!-- Flow Section -->
<section class="mb-section-margin bg-surface rounded-[20px] p-4 shadow-[0_-4px_20px_rgba(255,107,157,0.08)]">
<h2 class="font-title-md text-title-md text-on-surface mb-4">Flow Intensity</h2>
<div class="flex justify-between items-end h-16">
<button class="w-8 h-8 rounded-full bg-surface-container-high flex items-center justify-center hover:bg-surface-container-highest transition-colors" onclick="selectFlow(this, 1)"><span class="material-symbols-outlined text-on-surface-variant text-sm">water_drop</span></button>
<button class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center hover:bg-surface-container-highest transition-colors" onclick="selectFlow(this, 2)"><span class="material-symbols-outlined text-on-surface-variant text-base">water_drop</span></button>
<button class="w-12 h-12 rounded-full bg-phase-menstrual text-white flex items-center justify-center shadow-md transform scale-110" onclick="selectFlow(this, 3)"><span class="material-symbols-outlined text-lg">water_drop</span></button>
<button class="w-14 h-14 rounded-full bg-surface-container-high flex items-center justify-center hover:bg-surface-container-highest transition-colors" onclick="selectFlow(this, 4)"><span class="material-symbols-outlined text-on-surface-variant text-xl">water_drop</span></button>
<button class="w-16 h-16 rounded-full bg-surface-container-high flex items-center justify-center hover:bg-surface-container-highest transition-colors" onclick="selectFlow(this, 5)"><span class="material-symbols-outlined text-on-surface-variant text-2xl">water_drop</span></button>
</div>
</section>
<!-- Water Section -->
<section class="mb-section-margin bg-surface rounded-[20px] p-4 shadow-[0_-4px_20px_rgba(255,107,157,0.08)] flex justify-between items-center">
<div>
<h2 class="font-title-md text-title-md text-on-surface">Water Intake</h2>
<p class="font-body-sm text-body-sm text-text-muted mt-1"><span id="water-count">3</span> glasses today</p>
</div>
<button class="w-[48px] h-[48px] rounded-full bg-surface-container-high flex items-center justify-center hover:bg-surface-container-highest transition-colors text-primary active:scale-95" onclick="addWater()">
<span class="material-symbols-outlined">add</span>
</button>
</section>
<!-- Notes Section -->
<section class="mb-section-margin">
<h2 class="font-title-md text-title-md text-on-surface mb-4 px-2">Notes (Optional)</h2>
<textarea class="w-full bg-surface-container rounded-xl p-4 font-body-sm text-body-sm text-on-surface border-none focus:ring-2 focus:ring-primary-container placeholder-text-muted resize-none h-24" placeholder="Anything else you want to note?"></textarea>
</section>
<!-- Save Button -->
<button class="w-full min-h-[48px] bg-primary-container text-white font-button-text text-button-text rounded-full shadow-lg hover:opacity-90 active:scale-98 transition-all flex items-center justify-center gap-2 mb-8">
            Save &amp; bloom
            <span class="material-symbols-outlined text-sm">local_florist</span>
</button>
</main>
<script>
        function selectMood(btn) {
            const container = btn.parentElement;
            Array.from(container.children).forEach(child => {
                child.className = "w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center hover:bg-surface-container-highest transition-colors active:scale-95 text-2xl";
            });
            btn.className = "w-12 h-12 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center shadow-md active:scale-95 text-2xl transform scale-110 ring-2 ring-primary-container ring-offset-2 ring-offset-surface";
        }

        function selectEnergy(btn) {
            const container = btn.parentElement;
            Array.from(container.children).forEach(child => {
                child.className = "w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center hover:bg-surface-container-highest transition-colors active:scale-95";
                child.firstElementChild.className = "material-symbols-outlined text-on-surface-variant";
            });
            btn.className = "w-12 h-12 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center shadow-md active:scale-95 transform scale-110 ring-2 ring-primary-container ring-offset-2 ring-offset-surface";
            btn.firstElementChild.className = "material-symbols-outlined";
        }

        function togglePill(btn) {
            if (btn.classList.contains('bg-surface-container-high')) {
                btn.className = "min-h-[48px] px-6 py-2 rounded-full bg-primary-container text-on-primary-container font-button-text text-button-text whitespace-nowrap shadow-md flex-shrink-0 ring-1 ring-primary-container";
            } else {
                btn.className = "min-h-[48px] px-6 py-2 rounded-full bg-surface-container-high text-on-surface-variant font-button-text text-button-text whitespace-nowrap hover:bg-surface-container-highest transition-colors flex-shrink-0";
            }
        }
        
        function selectFlow(btn, level) {
            const container = btn.parentElement;
            const sizes = ['w-8 h-8', 'w-10 h-10', 'w-12 h-12', 'w-14 h-14', 'w-16 h-16'];
            const iconSizes = ['text-sm', 'text-base', 'text-lg', 'text-xl', 'text-2xl'];
            
            Array.from(container.children).forEach((child, index) => {
                child.className = `${sizes[index]} rounded-full bg-surface-container-high flex items-center justify-center hover:bg-surface-container-highest transition-colors`;
                child.firstElementChild.className = `material-symbols-outlined text-on-surface-variant ${iconSizes[index]}`;
            });
            
            btn.className = `${sizes[level-1]} rounded-full bg-phase-menstrual text-white flex items-center justify-center shadow-md transform scale-110`;
            btn.firstElementChild.className = `material-symbols-outlined ${iconSizes[level-1]}`;
        }

        let waterCount = 3;
        function addWater() {
            waterCount++;
            document.getElementById('water-count').innerText = waterCount;
        }
    </script>
</body></html>
