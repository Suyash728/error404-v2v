<body class="bg-surface-blush text-on-background min-h-screen flex flex-col font-body-lg">
<!-- Top App Bar -->
<header class="docked full-width top-0 bg-transparent flat no shadows flex justify-between items-center px-container-padding py-4 w-full z-50">
<button class="w-touch-target-min h-touch-target-min flex items-center justify-center rounded-full hover:bg-surface-container-highest transition-colors active:scale-95 text-primary">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<span class="text-label-caps font-label-caps text-text-muted">Step 3 of 3</span>
</header>
<!-- Main Content -->
<main class="flex-grow flex flex-col px-container-padding pb-container-padding max-w-md mx-auto w-full pt-4">
<div class="mb-section-margin text-center">
<h1 class="text-display-lg font-display-lg text-on-surface mb-2">What's your goal?</h1>
<p class="text-body-lg font-body-lg text-text-muted">We'll tailor your experience based on your needs.</p>
</div>
<!-- Goal Selection Cards -->
<div class="flex flex-col gap-stack-gap flex-grow">
<!-- Option 1 -->
<label class="cursor-pointer group relative block">
<input checked="" class="peer sr-only" name="goal" type="radio" value="tracking"/>
<div class="rounded-[20px] bg-surface p-6 shadow-soft transition-all duration-200 ease-in-out border-2 border-transparent peer-checked:border-primary-container peer-checked:bg-surface-container peer-checked:shadow-soft-active group-active:scale-[0.98] flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center text-primary-container peer-checked:bg-primary-container peer-checked:text-on-primary">
<span class="material-symbols-outlined text-2xl" data-icon="calendar_today">calendar_today</span>
</div>
<div class="flex-grow">
<span class="text-title-md font-title-md text-on-surface block">Just tracking</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center peer-checked:border-primary-container peer-checked:bg-primary-container">
<span class="material-symbols-outlined text-on-primary text-sm opacity-0 peer-checked:opacity-100 transition-opacity" data-icon="check">check</span>
</div>
</div>
</label>
<!-- Option 2 -->
<label class="cursor-pointer group relative block">
<input class="peer sr-only" name="goal" type="radio" value="avoiding"/>
<div class="rounded-[20px] bg-surface p-6 shadow-soft transition-all duration-200 ease-in-out border-2 border-transparent peer-checked:border-primary-container peer-checked:bg-surface-container peer-checked:shadow-soft-active group-active:scale-[0.98] flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center text-primary-container peer-checked:bg-primary-container peer-checked:text-on-primary">
<span class="material-symbols-outlined text-2xl" data-icon="shield">shield</span>
</div>
<div class="flex-grow">
<span class="text-title-md font-title-md text-on-surface block">Avoiding pregnancy</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center peer-checked:border-primary-container peer-checked:bg-primary-container">
<span class="material-symbols-outlined text-on-primary text-sm opacity-0 peer-checked:opacity-100 transition-opacity" data-icon="check">check</span>
</div>
</div>
</label>
<!-- Option 3 -->
<label class="cursor-pointer group relative block">
<input class="peer sr-only" name="goal" type="radio" value="conceiving"/>
<div class="rounded-[20px] bg-surface p-6 shadow-soft transition-all duration-200 ease-in-out border-2 border-transparent peer-checked:border-primary-container peer-checked:bg-surface-container peer-checked:shadow-soft-active group-active:scale-[0.98] flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center text-primary-container peer-checked:bg-primary-container peer-checked:text-on-primary">
<span class="material-symbols-outlined text-2xl" data-icon="favorite">favorite</span>
</div>
<div class="flex-grow">
<span class="text-title-md font-title-md text-on-surface block">Trying to conceive</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center peer-checked:border-primary-container peer-checked:bg-primary-container">
<span class="material-symbols-outlined text-on-primary text-sm opacity-0 peer-checked:opacity-100 transition-opacity" data-icon="check">check</span>
